name: Build Custom Debian ISO

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual triggering for testing

permissions:
  contents: write

jobs:
  build-iso:
    name: Build ISO Image
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
      options: --privileged  # Required for some live-build operations
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            curl \
            git \
            ca-certificates \
            sudo \
            fakeroot \
            mtools \
            dosfstools \
            grub-pc-bin \
            grub-efi-amd64-bin \
            isolinux \
            syslinux-efi \
            cpio \
            p7zip-full
      
      - name: Set up build environment
        run: |
          # Create build directory
          mkdir -p /build
          cd /build
          
          # Copy configuration from repository if it exists
          if [ -d "$GITHUB_WORKSPACE/config" ]; then
            cp -r $GITHUB_WORKSPACE/config /build/
          fi
          
          # Copy hooks from repository if they exist
          if [ -d "$GITHUB_WORKSPACE/hooks" ]; then
            cp -r $GITHUB_WORKSPACE/hooks /build/config/ 2>/dev/null || :
          fi
          
          # Copy includes from repository if they exist
          if [ -d "$GITHUB_WORKSPACE/includes.chroot" ]; then
            cp -r $GITHUB_WORKSPACE/includes.chroot /build/config/ 2>/dev/null || :
          fi
          
      - name: Clean previous build artifacts
        run: |
          cd /build
          lb clean --purge
          
      - name: Initialize live-build configuration
        run: |
          cd /build
          
          # Extract version from release tag
          VERSION=${GITHUB_REF_NAME#v}  # Remove 'v' prefix if present
          VERSION=${VERSION:-1.0.0}      # Default if not set
          
          lb config \
            -a amd64 \
            -d trixie \
            --archive-areas "main contrib non-free non-free-firmware" \
            --bootloader grub-efi \
            --debian-installer false \
            --distribution trixie \
            --iso-application "AEM OS" \
            --iso-publisher "mehmedaltug" \
            --iso-volume "AEM_OS-${VERSION}" \
            --memtest none \
            --mode debian \
            --parent-distribution trixie \
            --parent-archive-areas "main contrib non-free non-free-firmware" \
            --security true \
            --updates true \
            --cache true \
            --bootappend-live "boot=live components autologin" \
            --chroot-squashfs-compression-level -extreme

      - name: Verify config directory
        run: |
            ls -la /build
            ls -la /build/config/ || echo "config/ directory missing!"
      
      - name: Create package lists
        run: |
          cd /build
          
          # Create desktop package list
          mkdir -p config/package-lists
          cat > config/package-lists/desktop.list.chroot << 'EOF'
          # Base system
          task-english
          task-laptop
          alsa-utils
          sudo
          network-manager
          network-manager-gnome
          firmware-linux
          firmware-iwlwifi
          firmware-realtek

          # Bootloader dependencies for Calamares (CRITICAL FIX)
          grub-efi-amd64-bin
          grub-pc-bin
          efibootmgr
          os-prober
          
          # Minimal GNOME desktop
          gnome-core
          gnome-themes-extra
          gnome-shell-extension-manager
          gnome-tweaks
          gdm3
          
          # Printing support
          cups
          cups-client
          cups-filters
          system-config-printer
          
          # Installer
          calamares
          calamares-settings-debian
          
          # Homebrew dependencies
          build-essential
          curl
          file
          git
          gh
          python3
          procps
          EOF
          
          # Create live package list
          cat > config/package-lists/live.list.chroot << 'EOF'
          live-boot
          live-config
          live-config-systemd
          live-tools
          user-setup
          sudo
          EOF
      
      - name: Create installation hooks
        run: |
          cd /build
          mkdir -p config/hooks/normal
          
          # Flatpak and Homebrew installation hook
          cat > config/hooks/normal/1000-install-flatpak-and-homebrew.chroot << 'EOF'
          #!/bin/bash
          
          # Install Flatpak and GNOME integration
          apt-get install -y flatpak
          
          # Add Flathub repository
          flatpak remote-add --system flathub https://flathub.org/repo/flathub.flatpakrepo

          # Install flatpak app(s)
          #flatpak install -y org.mozilla.firefox
          
          # Install dependencies
          apt-get install -y build-essential curl file git procps flatseal file-roller wget make openjdk-25-jdk

          # Post installation actions
          # - Set file-roller as default
          grep '^MimeType=' /usr/share/applications/org.gnome.Nautilus.desktop | cut -d'=' -f2 | tr ';' $'\n' | grep -v 'inode/directory' | xargs xdg-mime default org.gnome.FileRoller.desktop

          # Install firefox latest
          sudo install -d -m 0755 /etc/apt/keyrings
          wget -q https://packages.mozilla.org/apt/repo-signing-key.gpg -O- | sudo tee /etc/apt/keyrings/packages.mozilla.org.asc > /dev/null
          gpg -n -q --import --import-options import-show /etc/apt/keyrings/packages.mozilla.org.asc | awk '/pub/{getline; gsub(/^ +| +$/,""); print "\n"$0"\n"}'
          echo "deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.asc] https://packages.mozilla.org/apt mozilla main" | sudo tee /etc/apt/sources.list.d/mozilla.list > /dev/null
          echo '
          Package: *
          Pin: origin packages.mozilla.org
          Pin-Priority: 1000
          ' | sudo tee /etc/apt/preferences.d/mozilla
          sudo apt update && sudo apt install -y firefox

          # Remove unwanted packages
          apt-get remove --purge -y firefox-esr gnome-contacts gnome-tour gnome-maps malcontent plymouth gnome-software*
          apt-get autoremove -y

          # Remove unwanted service(s)
          systemctl disable NetworkManager-wait-online.service

          # Remove unwanted desktop entry(s)
          rm -f /usr/share/applications/kdesystemsettings.desktop
          rm -f /usr/share/applications/yelp.desktop
          
          # Create the linuxbrew directory
          mkdir -p /home/linuxbrew/.linuxbrew/Homebrew
          mkdir -p /home/linuxbrew/.linuxbrew/bin
          
          # Clone Homebrew manually (bypassing the root-check installer)
          git clone https://github.com/Homebrew/brew /home/linuxbrew/.linuxbrew/Homebrew
          
          # Symlink the executable
          ln -s /home/linuxbrew/.linuxbrew/Homebrew/bin/brew /home/linuxbrew/.linuxbrew/bin/brew
          
          # Open permissions so ANY user (live or installed) can use it
          chmod -R a+rwx /home/linuxbrew/.linuxbrew

          # Create the linuxbrew user (CRITICAL FIX)
          useradd -m -s /bin/bash linuxbrew
          chown -R linuxbrew:linuxbrew /home/linuxbrew

          # Auto-install Homebrew packages (Add your desired apps here
          su - linuxbrew -c "/home/linuxbrew/.linuxbrew/bin/brew install node npm"
          
          # Clean up the Homebrew cache
          su - linuxbrew -c "/home/linuxbrew/.linuxbrew/bin/brew cleanup --prune=all"

          # Restore permissions:
          chown -R root:root /home/linuxbrew
          chmod -R a+rwx /home/linuxbrew/.linuxbrew
          
          # Remove linuxbrew user (CRITICAL FIX)
          userdel linuxbrew
          
          # Set up Homebrew in system profile
          cat > /etc/profile.d/homebrew.sh << 'BREW'
          #!/bin/bash
          if [ -d /home/linuxbrew/.linuxbrew ]; then
              eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          fi
          BREW
          chmod +x /etc/profile.d/homebrew.sh
          
          # Also add to bash.bashrc for interactive shells
          cat >> /etc/bash.bashrc << 'BASHRC'
          # Homebrew
          if [ -d /home/linuxbrew/.linuxbrew ] && [ -n "$BASH_VERSION" ]; then
              eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          fi
          BASHRC
          EOF
          chmod +x config/hooks/normal/1000-install-flatpak-and-homebrew.chroot
          
          # Skip GNOME initial setup
          cat > config/hooks/normal/4000-skip-gnome-initial-setup.chroot << 'EOF'
          #!/bin/bash
          
          # Place the config in the skeleton directory. 
          # It will automatically copy to the live user AND the installed user!
          mkdir -p /etc/skel/.config
          echo "yes" > /etc/skel/.config/gnome-initial-setup-done
          EOF
          chmod +x config/hooks/normal/4000-skip-gnome-initial-setup.chroot

          cat > config/hooks/normal/9999-final-cleanup.chroot << 'EOF'
          #!/bin/bash
          
          # Clean APT caches
          apt-get clean
          apt-get autoremove --purge -y
          rm -rf /var/lib/apt/lists/*
          
          # Strip English locales to the bare minimum (optional but saves space)
          find /usr/share/locale -mindepth 1 -maxdepth 1 ! -name 'en*' -exec rm -rf {} +
          EOF
          chmod +x config/hooks/normal/9999-final-cleanup.chroot
      
      - name: Create Calamares installer configuration
        run: |
          cd /build
          mkdir -p config/includes.chroot/etc/calamares/modules
          
          # Create welcome module
          cat > config/includes.chroot/etc/calamares/modules/welcome.conf << 'EOF'
          ---
          welcomeStyle: SideBySide
          showSupportUrl: false
          showKnownIssuesUrl: false
          showReleaseNotesUrl: false
          requirements:
            required:
              - storage
              - ram
              - root
              - screen
            requiredStorage: 5.0
            requiredRam: 1.0
            check:
              - storage
              - ram
              - root
              - screen
          EOF
          
          # Create users module (THIS IS WHERE USERS SET USERNAME/PASSWORD)
          cat > config/includes.chroot/etc/calamares/modules/users.conf << 'EOF'
          ---
          defaultGroups:
            - audio
            - cdrom
            - dip
            - floppy
            - netdev
            - plugdev
            - sudo
            - video
          autologinGroup: autologin
          doAutologin: false
          sudoersGroup: sudo
          setRootPassword: true
          doReusePassword: true
          passwordRequirements:
            minLength: 1
            maxLength: 0
            requireNonEmpty: true
          userShell: /bin/bash
          EOF
          
          # Create partition module
          cat > config/includes.chroot/etc/calamares/modules/partition.conf << 'EOF'
          ---
          defaultFileSystemType: ext4
          alwaysShowPartitionLabels: true
          allowManualPartitioning: true
          drawNestedPartitions: true
          enableEncryption: true
          enableLuksAutomount: true
          eraseFsFile: true
          EOF
          
          # Create main Calamares settings
          cat > config/includes.chroot/etc/calamares/settings.conf << 'EOF'
          ---
          modules-search: [ local ]
          
          sequence:
            - show:
              - welcome
              - locale
              - keyboard
              - users
              - partition
              - summary
            - exec:
              - partition
              - mount
              - unpackfs
              - machineid
              - fstab
              - locale
              - keyboard
              - localecfg
              - hwclock
              - users
              - displaymanager
              - networkcfg
              - initramfs
              - grubcfg
              - bootloader
              - packages
              - shellprocess
              - umount
            - show:
              - finished
          
          branding: aem-os
          prompt-install: true
          dont-chroot: false
          oem-setup: false
          disable-cancel: false
          quit-at-end: false
          EOF

          # Create unpackfs module
          cat > config/includes.chroot/etc/calamares/modules/unpackfs.conf << 'EOF'
          ---
          unpack:
            - source: /run/live/medium/live/filesystem.squashfs
              sourcefs: squashfs
              destination: ""
          EOF

          # Create packages module
          cat > config/includes.chroot/etc/calamares/modules/packages.conf << 'EOF'
          ---
          backend: apt
          operations:
            - remove:
                - live-boot
                - live-config
                - live-config-systemd
                - live-tools
                - calamares
                - calamares-settings-debian
          EOF

          # Create locale module (Timezone & Language)
          cat > config/includes.chroot/etc/calamares/modules/locale.conf << 'EOF'
          ---
          region: "America"
          zone: "New_York"
          useSystemTimezone: true
          EOF

          # Create keyboard module
          cat > config/includes.chroot/etc/calamares/modules/keyboard.conf << 'EOF'
          ---
          xkbmodel: "pc105"
          EOF

          # Create shellprocess module to clean up the desktop icon
          cat > config/includes.chroot/etc/calamares/modules/shellprocess.conf << 'EOF'
          ---
          dontChroot: false
          script:
              - command: "rm -f /etc/skel/Desktop/install-system.desktop"
              - command: "rm -f /home/*/Desktop/install-system.desktop"
          EOF
      
      - name: Create branding
        run: |
          cd /build
          mkdir -p config/includes.chroot/usr/share/calamares/branding/aem-os

          VERSION=${GITHUB_REF_NAME#v}
          VERSION=${VERSION:-1.0.0}

          # Create custom OS release info for GNOME and system fetch tools
          mkdir -p config/includes.chroot/usr/lib
          cat > config/includes.chroot/usr/lib/os-release << EOF
          PRETTY_NAME="AEM OS ${VERSION}"
          NAME="AEM OS"
          VERSION_ID="${VERSION}"
          VERSION="${VERSION}"
          VERSION_CODENAME="aemos"
          ID=aemos
          ID_LIKE=debian
          EOF
          
          # Copy it to /etc/os-release to ensure strict compatibility
          cp config/includes.chroot/usr/lib/os-release config/includes.chroot/etc/os-release
          
          # Update the TTY terminal login prompts too
          cat > config/includes.chroot/etc/issue << EOF
          AEM OS ${VERSION} \n \l
          
          EOF
          
          cat > config/includes.chroot/etc/issue.net << EOF
          AEM OS ${VERSION}
          EOF
          
          # Create branding descriptor
          cat > config/includes.chroot/usr/share/calamares/branding/aem-os/branding.desc << EOF
          componentName:  aem-os
          
          strings:
              productName:         AEM OS
              shortProductName:    AEMOS
              version:             ${VERSION}
              shortVersion:        ${VERSION}
              versionedName:       AEM OS ${VERSION}
              shortVersionedName:  AEMOS ${VERSION}
              bootloaderEntryName: AEM-OS
              welcomeMessage:      "Welcome to the AEM OS installer."
              aboutMessage:        "Thanks for choosing AEM OS.\n\nThis installer will guide you through the setup process."

          images:
              productLogo:         ""
              productIcon:         ""
              productWelcome:      ""

          slideshow:               []
          
          style:
              sidebarBackground:   "#2c3e50"
              sidebarText:         "#ffffff"
              sidebarBackgroundCurrent: "#e67e22"
          EOF
        
      - name: Create desktop shortcut for installer
        run: |
          cd /build
          mkdir -p config/includes.chroot/etc/skel/Desktop
          
          cat > config/includes.chroot/etc/skel/Desktop/install-system.desktop << 'EOF'
          [Desktop Entry]
          Name=Install System
          Comment=Install this distribution to your hard disk
          Exec=sudo -E calamares
          Icon=system-os-install
          Terminal=false
          Type=Application
          Categories=System;
          StartupNotify=true
          EOF
          
          # Make executable in hook
          mkdir -p config/hooks/normal
          cat > config/hooks/normal/5000-desktop-shortcuts.chroot << 'EOF'
          #!/bin/bash
          
          # Just make sure it's executable in the skeleton directory.
          if [ -f /etc/skel/Desktop/install-system.desktop ]; then
              chmod +x /etc/skel/Desktop/install-system.desktop
          fi
          EOF
          chmod +x config/hooks/normal/5000-desktop-shortcuts.chroot
      
      - name: Build the ISO
        run: |
          cd /build
          
          # Build the ISO
          lb build 2>&1 | tee build.log
          
          # Check if ISO was created
          if [ ! -f live-image-amd64.hybrid.iso ]; then
              echo "ISO build failed!"
              exit 1
          fi
      
      - name: Prepare ISO for artifact
        run: |
          cd /build
          
          # Get version from release tag and strip the 'v'
          VERSION=${GITHUB_REF_NAME#v}
          VERSION=${VERSION:-latest}
          
          # Create a clean ISO filename with version
          mv live-image-amd64.hybrid.iso "aem-os-${VERSION}.iso"

          # Compress it to 7z
          7z a -t7z -m0=lzma2 -mx=9 -md=128m -mfb=256 -v1900m "aem-os-${VERSION}.7z" "aem-os-${VERSION}.iso"
          
          # Create SHA256 checksum
          sha256sum "aem-os-${VERSION}.iso" > "aem-os-${VERSION}.iso.sha256"

          # Remove iso file
          rm -f "aem-os-${VERSION}.iso"
          
          # Also save build log
          cp build.log "aem-os-${VERSION}-build.log" 2>/dev/null || :
      
      - name: Upload Release Assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /build/aem-os-*.7z*
            /build/aem-os-*.iso.sha256
            /build/aem-os-*-build.log
      
      - name: Upload artifacts (for workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: aem-os-iso
          path: |
            /build/aem-os-*.7z*
            /build/aem-os-*.iso.sha256
            /build/aem-os-*-build.log
          retention-days: 30
